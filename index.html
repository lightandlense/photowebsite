<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darkroom Portfolio</title>

  <!-- Google Fonts — Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Design System CSS (order matters: tokens first) -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/grain.css">
  <link rel="stylesheet" href="css/entrance.css">
  <link rel="stylesheet" href="css/darkroom.css">
  <link rel="stylesheet" href="css/transition.css">
  <link rel="stylesheet" href="css/gallery.css">
</head>
<body>

  <div id="app">

    <section id="entrance" class="scene">
      <!-- Illustrated building entrance -->
      <div class="scene__layer" data-layer="building" style="z-index: 1"></div>
      <div class="scene__layer" data-layer="door" style="z-index: 2" id="door" role="button" tabindex="0" aria-label="Enter the darkroom studio"></div>
      <div class="entrance__step-inside" style="z-index: 3">Step Inside</div>
      <div class="scene__overlay--darkness" style="z-index: 8"></div>
    </section>

    <section id="darkroom" class="scene" style="display: none;">
      <!-- Photographic darkroom background (no photos in image) -->
      <div class="darkroom__background"></div>
      <div class="darkroom__safelight"></div>

      <!-- Top clothesline — 5 photos (3 genre + 2 decorative) -->
      <div class="clothesline clothesline--top">
        <div class="clothesline__wire"></div>
        <figure class="clothesline__photo" data-genre="fashion">
          <div class="clothesline__pin"></div>
          <div class="clothesline__image" style="background: url('images/fashion/high-fashion-gobo-Photography.jpg') center/cover;">
            <span class="clothesline__genre-label">Fashion</span>
          </div>
        </figure>
        <figure class="clothesline__photo clothesline__photo--decorative">
          <div class="clothesline__pin"></div>
          <div class="clothesline__image" style="background: linear-gradient(175deg, #1a1814 0%, #3a3028 20%, #2a2218 40%, #4a3e30 65%, #1e1a14 100%);"></div>
        </figure>
        <figure class="clothesline__photo" data-genre="beauty">
          <div class="clothesline__pin"></div>
          <div class="clothesline__image" style="background: url('images/beauty/DSC5447-Edit-min.jpg') center/cover;">
            <span class="clothesline__genre-label">Beauty</span>
          </div>
        </figure>
        <figure class="clothesline__photo clothesline__photo--decorative">
          <div class="clothesline__pin"></div>
          <div class="clothesline__image" style="background: linear-gradient(170deg, #1c1c20 0%, #2e2a24 25%, #3a3630 50%, #22201c 75%, #18161a 100%);"></div>
        </figure>
        <figure class="clothesline__photo" data-genre="light-painting">
          <div class="clothesline__pin"></div>
          <div class="clothesline__image" style="background: url('images/light-painting/Russell-Klimas-Lightpainting-min.jpg') center/cover;">
            <span class="clothesline__genre-label">Light Painting</span>
          </div>
        </figure>
      </div>

      <!-- Bottom clothesline — 4 photos (2 genre + 2 nav) -->
      <div class="clothesline clothesline--bottom">
        <div class="clothesline__wire"></div>
        <figure class="clothesline__photo" data-genre="drone">
          <div class="clothesline__pin"></div>
          <div class="clothesline__image" style="background: url('images/drone/Balance-Steamboat-Garden-of-the-Gods-drone-light-painting.jpg') center/cover;">
            <span class="clothesline__genre-label">Drone</span>
          </div>
        </figure>
        <figure class="clothesline__photo" data-nav="about" role="button" tabindex="0" aria-label="Navigate to About page">
          <div class="clothesline__pin"></div>
          <div class="clothesline__image" style="background: linear-gradient(180deg, #2a2018 0%, #5a4430 25%, #6B5030 45%, #3A2A1A 70%, #1a1410 100%);">
            <span class="clothesline__genre-label">About Me</span>
          </div>
        </figure>
        <figure class="clothesline__photo" data-nav="contact" role="button" tabindex="0" aria-label="Navigate to Contact page">
          <div class="clothesline__pin"></div>
          <div class="clothesline__image" style="background: linear-gradient(180deg, #0e1a28 0%, #1A2A3A 25%, #405868 45%, #305060 70%, #0a1420 100%);">
            <span class="clothesline__genre-label">Contact</span>
          </div>
        </figure>
        <figure class="clothesline__photo" data-genre="gels">
          <div class="clothesline__pin"></div>
          <div class="clothesline__image" style="background: url('images/gels/DSC7601-Edit.jpg') center/cover;">
            <span class="clothesline__genre-label">Gels</span>
          </div>
        </figure>
      </div>
    </section>

    <!-- Gallery — filmstrip built dynamically by js/gallery.js -->
    <section id="gallery" class="scene" style="display: none;">
      <div class="gallery__bg"></div>
      <p class="gallery__genre-name" id="gallery-genre-name"></p>
      <!-- Filmstrip injected here by buildFilmstrip() -->
      <button id="gallery-back" class="gallery__back" aria-label="Return to darkroom">&#8592; Back</button>
    </section>

  </div>

  <!-- GSAP 3.14.2 — loaded before module script so globals are available -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/ScrollSmoother.min.js"></script>

  <!-- App entry point (created in Plan 02) -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
